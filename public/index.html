<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- TELA LOGIN -->
        <section id="page-login" class="page active">
            <div class="auth-header"><h1>WEALTH</h1><p class="auth-subtitle">Faça login para acompanhar seus lucros.</p></div>
            <div class="form-box">
                <input type="text" id="l-phone" placeholder="Número de Telefone" class="input-tiny">
                <input type="password" id="l-pass" placeholder="Senha" class="input-tiny">
                <div class="captcha-box">
                    <div id="l-cap-val" class="captcha-val">----</div>
                    <input type="text" id="l-cap-in" placeholder="Código" class="input-tiny" style="width: 100px; margin-bottom:0">
                </div>
                <!-- Botão com ID e Onclick Corretos -->
                <button id="btn-login-action" class="btn btn-saq" onclick="doLogin()">Entrar na Conta</button>
                <p class="auth-link" onclick="showPage('page-register')">Novo aqui? <span>Criar nova conta</span></p>
            </div>
        </section>

        <!-- TELA REGISTRO -->
        <section id="page-register" class="page">
            <div class="auth-header"><h2>Criar Conta</h2><p class="auth-subtitle">Comece sua jornada financeira hoje.</p></div>
            <div class="form-box">
                <input type="text" id="r-phone" placeholder="Número de Telefone" class="input-tiny">
                <input type="text" id="r-name" placeholder="Nome Completo" class="input-tiny">
                <input type="password" id="r-pass" placeholder="Senha" class="input-tiny">
                <input type="password" id="r-confirm" placeholder="Confirmar Senha" class="input-tiny">
                <input type="text" id="r-invite" placeholder="Código de Convite" class="input-tiny">
                <div class="captcha-box">
                    <div id="r-cap-val" class="captcha-val">----</div>
                    <input type="text" id="r-cap-in" placeholder="Código" class="input-tiny" style="width: 100px; margin-bottom:0">
                </div>
                <!-- Botão com ID e Onclick Corretos -->
                <button id="btn-register-action" class="btn btn-dep" onclick="doRegister()">Registrar Minha Conta</button>
                <p class="auth-link" onclick="showPage('page-login')">Já tem conta? <span>Fazer Login</span></p>
            </div>
        </section>

        <!-- DASHBOARD (Início) -->
        <section id="page-home" class="page">
            <div class="user-info">Olá, <span id="u-name">...</span> 👋<br><small id="cur-date"></small></div>
            <div class="wealth-card">
                <small>Saldo Disponível</small>
                <div class="amount-text">MT <span id="u-balance">0.00</span></div>
                <div class="badge-mzn">MZN 🇲🇿</div>
            </div>
            <div class="grid-actions">
                <button class="btn-action-sm btn-dep" onclick="showPage('page-deposit')">📥 Depositar</button>
                <button class="btn-action-sm btn-saq" onclick="showPage('page-withdraw')">📤 Sacar</button>
            </div>
            <h4 class="label-section">Plano Iniciante</h4>
            <div id="plans-list"></div>
        </section>

        <!-- BARRA DE NAVEGAÇÃO -->
        <nav class="nav-bar" id="main-nav" style="display:none">
            <div class="nav-item active" onclick="showPage('page-home', this)">🏠<br>Início</div>
            <div class="nav-item" onclick="showPage('page-projects', this)">📂<br>Projetos</div>
            <div class="nav-item" onclick="showPage('page-profits', this)">💰<br>Lucros</div>
            <div class="nav-item" onclick="showPage('page-team', this)">👥<br>Equipe</div>
            <div class="nav-item" onclick="showPage('page-account', this)">⚙️<br>Conta</div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
