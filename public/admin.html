<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Admin - PRO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-nav { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: #0d1b3e; position: sticky; top: 0; z-index: 1000; }
        .nav-tab { padding: 10px 18px; background: rgba(255,255,255,0.05); border: 1px solid #1e3a8a; border-radius: 8px; color: #8899ac; cursor: pointer; white-space: nowrap; font-size: 13px; }
        .nav-tab.active { background: var(--blue); color: white; border-color: white; }
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        
        .card-user { background: #0b1437; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #1e3a8a; }
        .grid-u { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; margin-top: 10px; }
        .grid-u b { color: white; }
        .btn-adm-sm { padding: 8px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body class="admin-body">

    <div class="admin-nav">
        <div class="nav-tab active" onclick="openTab(this, 'view-analytics')">📊 Analytics</div>
        <div class="nav-tab" onclick="openTab(this, 'view-users')">👥 Usuários</div>
        <div class="nav-tab" onclick="openTab(this, 'view-deposits')">💰 Depósitos</div>
        <div class="nav-tab" onclick="openTab(this, 'view-withdraws')">💸 Saques</div>
        <div class="nav-tab" onclick="openTab(this, 'view-plans')">📋 Planos</div>
        <div class="nav-tab" onclick="openTab(this, 'view-ads')">📢 Anúncios</div>
    </div>

    <div id="admin-main">
        <!-- ANALYTICS -->
        <section id="view-analytics" class="tab-content active">
            <div id="stats-render" class="admin-grid-stats">Carregando dados...</div>
        </section>

        <!-- USUÁRIOS -->
        <section id="view-users" class="tab-content">
            <input type="text" id="searchU" class="search-box" placeholder="Buscar telefone ou nome..." onkeyup="filterUsers()">
            <div id="users-render" style="margin-top:15px"></div>
        </section>

        <!-- DEPÓSITOS -->
        <section id="view-deposits" class="tab-content">
            <div id="deposits-render"></div>
        </section>

        <!-- SAQUES -->
        <section id="view-withdraws" class="tab-content">
            <div id="withdraws-render"></div>
        </section>

        <!-- PLANOS -->
        <section id="view-plans" class="tab-content">
            <div class="wealth-card">
                <h3>+ Novo Plano</h3>
                <form id="form-plan-admin" enctype="multipart/form-data">
                    <input type="text" id="p_name" placeholder="Nome" class="input-tiny" required>
                    <input type="number" id="p_price" placeholder="Preço" class="input-tiny" required>
                    <input type="number" id="p_daily" placeholder="Lucro Diário" class="input-tiny" required>
                    <input type="number" id="p_duration" placeholder="Duração" class="input-tiny" required>
                    <input type="file" id="p_image" accept="image/*" class="input-tiny">
                    <button type="submit" class="btn btn-green">Publicar Plano</button>
                </form>
            </div>
            <div id="plans-render" style="margin-top:20px"></div>
        </section>

        <!-- ANÚNCIOS -->
        <section id="view-ads" class="tab-content">
            <div class="wealth-card">
                <textarea id="ad_msg" class="input-tiny" placeholder="Mensagem do anúncio..."></textarea>
                <button class="btn btn-blue" onclick="postAd()">Postar Notificação</button>
            </div>
            <div id="ads-render" style="margin-top:20px"></div>
        </section>
    </div>

    <script>
        function openTab(btn, id) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(id).classList.add('active');
            refresh(id);
        }

        async function refresh(id) {
            if(id === 'view-analytics') {
                const res = await fetch('/api/admin/full-stats');
                const s = await res.json();
                document.getElementById('stats-render').innerHTML = `<div class="mini-card"><h4>Usuários</h4><p>${s.totalUsers}</p></div><div class="mini-card"><h4>Saldo Total</h4><p>MT ${s.totalBalance}</p></div>`;
            }

            if(id === 'view-users') {
                const res = await fetch('/api/admin/user-details');
                const users = await res.json();
                let html = "";
                users.forEach(u => {
                    html += `
                    <div class="card-user">
                        <div style="display:flex; justify-content:space-between"><b>${u.name}</b> <span>MT ${u.balance}</span></div>
                        <div class="grid-u">
                            <div>📞 Tel: <b>${u.phone}</b></div>
                            <div>🔑 Senha: <b style="color:orange">${u.password_plain || '---'}</b></div>
                            <div>👥 Convidados: <b>${u.total_invites}</b></div>
                            <div>💰 Ganhou: <b>MT ${u.total_earned || 0}</b></div>
                        </div>
                        <div style="margin-top:10px; display:flex; gap:5px">
                            <button class="btn-adm-sm btn-blue" onclick="editPhone(${u.id})">Editar Tel</button>
                            <button class="btn-adm-sm btn-green" onclick="addPlan(${u.id})">+ Plano</button>
                            <button class="btn-adm-sm" style="background:red" onclick="ban(${u.id})">Banir</button>
                        </div>
                    </div>`;
                });
                document.getElementById('users-render').innerHTML = html;
            }

            if(id === 'view-deposits' || id === 'view-withdraws') {
                const type = id === 'view-deposits' ? 'deposit' : 'withdraw';
                const res = await fetch(`/api/admin/transactions?type=${type}`);
                const list = await res.json();
                let html = "";
                list.forEach(t => {
                    html += `
                    <div class="card-user">
                        <p><b>${t.name}</b> - MT ${t.amount}</p>
                        ${t.proof_url ? `<img src="${t.proof_url}" style="width:100%; border-radius:10px">` : ''}
                        <button onclick="handleTrans(${t.id}, 'approve', '${id}')" class="btn-adm-sm btn-green">Aprovar</button>
                        <button onclick="handleTrans(${t.id}, 'reject', '${id}')" class="btn-adm-sm" style="background:red">Recusar</button>
                    </div>`;
                });
                document.getElementById(type + 's-render').innerHTML = html || "Vazio.";
            }

            if(id === 'view-ads') {
                const res = await fetch('/api/admin/list-ads');
                const ads = await res.json();
                let html = "";
                ads.forEach(a => {
                    html += `<div class="card-user"><p>${a.message}</p><button class="btn-adm-sm" style="background:red" onclick="delAd(${a.id})">Eliminar</button></div>`;
                });
                document.getElementById('ads-render').innerHTML = html;
            }
        }

        async function editPhone(id) {
            const n = prompt("Novo número de telefone:");
            if(n) await fetch('/api/admin/user/update-phone', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({userId: id, newPhone: n}) });
            refresh('view-users');
        }

        async function postAd() {
            const m = document.getElementById('ad_msg').value;
            await fetch('/api/admin/send-ad', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message: m}) });
            document.getElementById('ad_msg').value = "";
            refresh('view-ads');
        }

        async function delAd(id) {
            await fetch('/api/admin/delete-ad', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id}) });
            refresh('view-ads');
        }

        // Script de envio do Plano com Foto
        document.getElementById('form-plan-admin').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('name', document.getElementById('p_name').value);
            fd.append('price', document.getElementById('p_price').value);
            fd.append('daily', document.getElementById('p_daily').value);
            fd.append('duration', document.getElementById('p_duration').value);
            fd.append('image', document.getElementById('p_image').files[0]);
            await fetch('/api/admin/create-plan', { method: 'POST', body: fd });
            alert("Plano Criado!");
            refresh('view-plans');
        }

        refresh('view-analytics');
    </script>
</body>
</html>
