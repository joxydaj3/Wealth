<!DOCTYPE html>
<html lang="pt">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"></head>
<body style="padding:20px">
    <h2>🛡️ Painel Admin</h2>
    <div class="wealth-card">
        <h3>+ Adicionar Novo Plano</h3>
        <form id="plan-form">
            <input type="text" name="name" placeholder="Nome do Plano" required>
            <input type="number" name="price" placeholder="Preço do Plano" required>
            <input type="number" name="daily" placeholder="Lucro Diário" required>
            <input type="number" name="duration" placeholder="Duração (Dias)" required>
            <p>Foto do Plano:</p>
            <input type="file" name="image" accept="image/*">
            <button type="submit" class="btn-sm btn-dep" style="width:100%">Salvar Plano</button>
        </form>
    </div>

    <script>
        document.getElementById('plan-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            await fetch('/api/admin/create-plan', { method: 'POST', body: formData });
            alert("Plano criado com sucesso!");
            e.target.reset();
        };
    </script>
</body>
</html>
