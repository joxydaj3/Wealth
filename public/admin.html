<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Admin - Controle Total</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .mini-card { background: var(--card); padding: 12px; border-radius: 12px; border-left: 4px solid var(--blue); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .mini-card h4 { margin: 0; font-size: 11px; color: #8899ac; text-transform: uppercase; }
        .mini-card p { margin: 5px 0 0; font-size: 16px; font-weight: 800; }
        .user-card-main { background: #0b1437; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #1e3a8a; }
        .user-header { display: flex; justify-content: space-between; border-bottom: 1px solid #1e3a8a; padding-bottom: 10px; margin-bottom: 10px; }
        .user-details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; }
        .plan-item { background: rgba(0,123,255,0.1); padding: 5px 10px; border-radius: 8px; display: flex; justify-content: space-between; margin-top: 5px; }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div class="header"><h2>🛡️ Painel de Administração</h2></div>

    <div class="admin-nav" style="display:flex; overflow-x:auto; gap:10px; padding:10px; background:#0d1b3e;">
        <button class="nav-tab active" onclick="openAdminTab(this, 'view-analytics')">📊 Analytics</button>
        <button class="nav-tab" onclick="openAdminTab(this, 'view-users')">👥 Usuários</button>
        <button class="nav-tab" onclick="openAdminTab(this, 'view-plans')">📋 Planos</button>
        <button class="nav-tab" onclick="openAdminTab(this, 'view-ads')">📢 Anúncios</button>
    </div>

    <!-- ANALYTICS DETALHADO -->
    <div id="view-analytics" class="tab-content active">
        <div class="admin-grid-stats" id="stats-container">
            <!-- Gerado dinamicamente -->
        </div>
    </div>

    <!-- GESTÃO DE USUÁRIOS -->
    <div id="view-users" class="tab-content" style="padding:15px;">
        <div id="users-list-full"></div>
    </div>

    <!-- GESTÃO DE PLANOS -->
    <div id="view-plans" class="tab-content" style="padding:15px;">
        <div class="wealth-card">
            <h3>+ Novo Plano</h3>
            <form id="add-plan-form">
                <input type="text" id="p_name" placeholder="Nome" class="input-tiny">
                <input type="number" id="p_price" placeholder="Preço" class="input-tiny">
                <input type="number" id="p_daily" placeholder="Lucro Diário" class="input-tiny">
                <input type="number" id="p_dur" placeholder="Duração (Dias)" class="input-tiny">
                <input type="file" id="p_img" class="input-tiny">
                <button type="submit" class="btn btn-green">Publicar Plano</button>
            </form>
        </div>
        <div id="admin-plans-list" style="margin-top:20px;"></div>
    </div>

    <!-- GESTÃO DE ANÚNCIOS -->
    <div id="view-ads" class="tab-content" style="padding:15px;">
        <div class="wealth-card">
            <h3>📢 Novo Anúncio</h3>
            <textarea id="ad_text" class="input-tiny" style="height:80px"></textarea>
            <button class="btn btn-blue" onclick="sendAd()">Enviar Notificação</button>
        </div>
        <div id="admin-ads-list" style="margin-top:20px;"></div>
    </div>

    <script>
        function openAdminTab(btn, tabId) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            refreshAdminData(tabId);
        }

        async function refreshAdminData(tabId) {
            if(tabId === 'view-analytics') {
                const res = await fetch('/api/admin/full-stats');
                const s = await res.json();
                document.getElementById('stats-container').innerHTML = `
                    <div class="mini-card"><h4>Total Usuários</h4><p>${s.totalUsers}</p></div>
                    <div class="mini-card" style="border-color:var(--green)"><h4>Saldo Total</h4><p>MT ${s.totalBalance.toFixed(2)}</p></div>
                    <div class="mini-card"><h4>Dep. Pendentes</h4><p>${s.depPending.c} (MT ${s.depPending.s || 0})</p></div>
                    <div class="mini-card"><h4>Saq. Pendentes</h4><p>${s.withPending.c} (MT ${s.withPending.s || 0})</p></div>
                    <div class="mini-card"><h4>Dep. Aprovados</h4><p>${s.depApproved.c}</p></div>
                    <div class="mini-card"><h4>Saq. Aprovados</h4><p>${s.withApproved.c}</p></div>
                    <div class="mini-card" style="border-color:var(--red)"><h4>Dep. Recusados</h4><p>${s.depRejected.c}</p></div>
                    <div class="mini-card" style="border-color:var(--red)"><h4>Saq. Recusados</h4><p>${s.withRejected.c}</p></div>
                `;
            }
            if(tabId === 'view-users') {
                const res = await fetch('/api/admin/user-details');
                const users = await res.json();
                let html = "";
                users.forEach(u => {
                    html += `
                        <div class="user-card-main">
                            <div class="user-header">
                                <strong>${u.name}</strong>
                                <span style="color:var(--green)">MT ${u.balance.toFixed(2)}</span>
                            </div>
                            <div class="user-details-grid">
                                <span>📞 ${u.phone}</span>
                                <span>🔑 Senha: ${u.password ? '*******' : '---'} (Encriptada)</span>
                                <span>📥 Total Dep: MT ${u.total_dep || 0}</span>
                                <span>📤 Total Saq: MT ${u.total_with || 0}</span>
                                <span>💰 Ganhos: MT ${u.total_earned || 0}</span>
                                <span>🆔 Ref: ${u.ref_code}</span>
                            </div>
                            <div style="margin-top:10px">
                                <small>PLANOS ATIVOS:</small>
                                ${u.active_plans.map(p => `
                                    <div class="plan-item">
                                        <span>${p.name} (Exp: ${p.expires_at})</span>
                                        <button onclick="removeUserPlan(${p.id})" style="color:red; background:none; border:none; cursor:pointer;">Remover</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                document.getElementById('users-list-full').innerHTML = html;
            }
            if(tabId === 'view-plans') {
                const res = await fetch('/api/admin/list-plans');
                const plans = await res.json();
                let html = "";
                plans.forEach(p => {
                    html += `<div class="plan-item"><span>${p.name} - MT ${p.price}</span> <button onclick="deletePlan(${p.id})" style="color:red">Eliminar</button></div>`;
                });
                document.getElementById('admin-plans-list').innerHTML = html;
            }
        }

        // Lógica de envio de formulários e deleção igual aos exemplos anteriores conectando aos novos endpoints...
        // Exemplo Deletar Plano
        async function deletePlan(id) {
            if(confirm("Deseja eliminar este plano?")) {
                await fetch('/api/admin/delete-plan', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id}) });
                refreshAdminData('view-plans');
            }
        }

        refreshAdminData('view-analytics');
    </script>
</body>
</html>
