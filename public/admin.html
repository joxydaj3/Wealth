<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Admin - Painel de Controle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-nav { display: flex; overflow-x: auto; background: #0d1b3e; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 100; }
        .tab-btn { padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid #1e3a8a; border-radius: 10px; color: #8899ac; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--blue); color: white; border-color: white; }
        
        .admin-page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .admin-page.active { display: block; }
        
        .data-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--blue); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .bg-pending { background: orange; color: black; }
        .bg-approved { background: var(--green); color: white; }
    </style>
</head>
<body>

    <div class="header" style="padding: 20px;">
        <h2>🛡️ Painel de Administração</h2>
    </div>

    <!-- MENU DE TODOS OS BOTÕES (Igual à imagem) -->
    <div class="admin-nav">
        <button class="tab-btn active" onclick="openTab(this, 'tab-stats')">📊 Analytics</button>
        <button class="tab-btn" onclick="openTab(this, 'tab-users')">👥 Usuários</button>
        <button class="tab-btn" onclick="openTab(this, 'tab-deposits')">💰 Depósitos</button>
        <button class="tab-btn" onclick="openTab(this, 'tab-withdraws')">💸 Saques</button>
        <button class="tab-btn" onclick="openTab(this, 'tab-plans')">📋 Planos</button>
        <button class="tab-btn" onclick="openTab(this, 'tab-ads')">📢 Anúncios</button>
    </div>

    <div id="pages-container">
        
        <!-- PÁGINA: ANALYTICS -->
        <section id="tab-stats" class="admin-page active">
            <div class="grid-actions">
                <div class="wealth-card"><small>Usuários</small><h2 id="st-u">0</h2></div>
                <div class="wealth-card"><small>Saldo Total</small><h2 id="st-b">MT 0</h2></div>
            </div>
        </section>

        <!-- PÁGINA: USUÁRIOS -->
        <section id="tab-users" class="admin-page">
            <h3>Lista de Membros</h3>
            <div id="list-users">Carregando...</div>
        </section>

        <!-- PÁGINA: DEPÓSITOS -->
        <section id="tab-deposits" class="admin-page">
            <h3>Gerenciar Depósitos</h3>
            <div id="list-deposits">Buscando comprovantes...</div>
        </section>

        <!-- PÁGINA: SAQUES -->
        <section id="tab-withdraws" class="admin-page">
            <h3>Pedidos de Levantamento</h3>
            <div id="list-withdraws">Buscando pedidos...</div>
        </section>

        <!-- PÁGINA: PLANOS -->
        <section id="tab-plans" class="admin-page">
            <div class="wealth-card">
                <h3>+ Adicionar Novo Plano</h3>
                <form id="f-plan" enctype="multipart/form-data">
                    <input type="text" id="pn" placeholder="Nome do Plano" class="input-tiny" required>
                    <input type="number" id="pp" placeholder="Preço" class="input-tiny" required>
                    <input type="number" id="pd" placeholder="Lucro Diário" class="input-tiny" required>
                    <input type="number" id="pt" placeholder="Duração (Dias)" class="input-tiny" required>
                    <p>Foto do Plano:</p>
                    <input type="file" id="pi" accept="image/*" class="input-tiny">
                    <button type="submit" class="btn btn-green">Salvar e Publicar</button>
                </form>
            </div>
            <div id="list-plans-admin" style="margin-top:20px"></div>
        </section>

        <!-- PÁGINA: ANÚNCIOS -->
        <section id="tab-ads" class="admin-page">
            <div class="wealth-card">
                <h3>📢 Notificação Global</h3>
                <textarea id="ad-msg" class="input-tiny" style="height:100px" placeholder="Olá investidores, temos novidades..."></textarea>
                <button class="btn btn-blue">Enviar para todos</button>
            </div>
        </section>

    </div>

    <script>
        function openTab(btn, tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            if(tabId === 'tab-stats') loadStats();
            if(tabId === 'tab-users') loadUsers();
            if(tabId === 'tab-deposits') loadTransactions('deposit');
            if(tabId === 'tab-withdraws') loadTransactions('withdraw');
        }

        async function loadStats() {
            const res = await fetch('/api/admin/stats');
            const d = await res.json();
            document.getElementById('st-u').innerText = d.totalUsers;
            document.getElementById('st-b').innerText = 'MT ' + d.totalBalance.toFixed(2);
        }

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            let html = "";
            users.forEach(u => {
                html += `
                    <div class="data-card">
                        <div class="flex-between">
                            <strong>${u.name}</strong>
                            <span>MT ${u.balance.toFixed(2)}</span>
                        </div>
                        <small>${u.phone} | Ref: ${u.ref_code}</small>
                        <button onclick="editBalance(${u.id}, ${u.balance})" style="margin-top:10px; font-size:10px">Ajustar Saldo</button>
                    </div>`;
            });
            document.getElementById('list-users').innerHTML = html;
        }

        async function loadTransactions(type) {
            const res = await fetch(`/api/admin/transactions?type=${type}`);
            const list = await res.json();
            const container = type === 'deposit' ? 'list-deposits' : 'list-withdraws';
            let html = "";
            list.forEach(t => {
                html += `
                    <div class="data-card">
                        <div class="flex-between">
                            <strong>${t.name} (${t.phone})</strong>
                            <span class="badge ${t.status === 'pending' ? 'bg-pending' : 'bg-approved'}">${t.status.toUpperCase()}</span>
                        </div>
                        <p>Valor: MT ${t.amount}</p>
                        ${t.proof_url ? `<img src="${t.proof_url}" style="width:100%; border-radius:10px; margin:10px 0" onclick="window.open(this.src)">` : ''}
                        <div class="btn-group" style="display:${t.status === 'pending' ? 'grid' : 'none'}">
                            <button class="btn-sm btn-green" onclick="approve(${t.id}, 'approve', '${type}')">Confirmar</button>
                            <button class="btn-sm" style="background:red" onclick="approve(${t.id}, 'reject', '${type}')">Negar</button>
                        </div>
                    </div>`;
            });
            document.getElementById(container).innerHTML = html || "Nada encontrado.";
        }

        async function approve(id, action, type) {
            await fetch('/api/admin/transaction-action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, action })
            });
            loadTransactions(type);
        }

        // Lógica de Criar Plano com Foto
        document.getElementById('f-plan').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('pn').value);
            formData.append('price', document.getElementById('pp').value);
            formData.append('daily', document.getElementById('pd').value);
            formData.append('duration', document.getElementById('pt').value);
            formData.append('image', document.getElementById('pi').files[0]);

            const res = await fetch('/api/admin/create-plan', { method: 'POST', body: formData });
            if(res.ok) { alert("Plano Ativado!"); location.reload(); }
        }

        loadStats(); // Inicial
    </script>
</body>
                    </html>
